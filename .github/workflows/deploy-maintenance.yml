name: Deploy maintenance page to Heberjahiz

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: heberjahiz-maintenance
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy maintenance files over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./maintenance/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          state-name: .maintenance-deploy-state.json
          log-level: standard
